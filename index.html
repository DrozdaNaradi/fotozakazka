<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Drozda Nářadí – Záruky</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#111;color:#fff;min-height:100vh;display:flex;flex-direction:column;max-width:390px;margin:0 auto}
.hdr{background:#E30000;padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.hdr-brand{font-size:11px;font-weight:700;color:rgba(255,255,255,0.75);letter-spacing:2px;text-transform:uppercase}
.hdr-title{font-size:18px;font-weight:700;color:#fff;line-height:1}
.hdr-badge{background:#000;color:#fff;font-size:11px;font-weight:700;padding:5px 11px;border-radius:3px;letter-spacing:.5px}
.body{flex:1;padding:12px;display:flex;flex-direction:column;gap:10px}
.lbl{font-size:10px;font-weight:700;color:#aaa;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.inp-wrap{background:#d4d4d4;border-radius:4px}
.inp-wrap input{width:100%;font-size:17px;font-weight:600;padding:11px 14px;border:none;background:transparent;color:#111;outline:none;-webkit-appearance:none;border-radius:4px}
.inp-wrap input::placeholder{font-weight:400;color:#888}
.folder-bar{background:#1c1c1c;border:1px solid #333;border-radius:3px;padding:6px 10px;margin-top:6px;display:none}
.folder-bar span{font-size:11px;color:#aaa;font-family:monospace}
.foto-btn{background:#E30000;border-radius:4px;padding:16px;display:flex;align-items:center;justify-content:center;gap:12px;width:100%;border:none;cursor:pointer;-webkit-appearance:none}
.foto-btn:active{opacity:.85}
.foto-icon-box{width:36px;height:36px;background:rgba(0,0,0,0.25);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.foto-btn-text{font-size:17px;font-weight:700;color:#fff;letter-spacing:.5px}
input[type=file]{display:none}
.foto-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px}
.thumb{position:relative;aspect-ratio:1;border-radius:3px;overflow:hidden;background:#222;border:1px solid #333}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .si{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.thumb .si.wait{background:rgba(0,0,0,.6);color:#aaa}
.thumb .si.uploading{background:#E30000;color:#fff}
.thumb .si.ok{background:#1a7a2a;color:#fff}
.thumb .si.err{background:#a32d2d;color:#fff}
.thumb .del{position:absolute;top:3px;right:3px;width:18px;height:18px;background:rgba(0,0,0,.7);border:none;border-radius:50%;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.info-box{background:#d4d4d4;border-radius:4px;overflow:hidden}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid #bbb}
.info-row:last-child{border-bottom:none}
.info-lbl{font-size:12px;color:#555;font-weight:600}
.info-val{font-size:12px;font-weight:700;color:#111}
.prog-wrap{background:#222;border-radius:3px;overflow:hidden;height:6px;display:none}
.prog-bar{height:100%;background:#1a7a2a;transition:width .3s;width:0%}
.status{font-size:13px;text-align:center;padding:10px 14px;border-radius:4px;display:none;line-height:1.5}
.status.ok{background:#0d2a0d;color:#4CAF50;border:1px solid #1a7a2a}
.status.err{background:#2a0d0d;color:#ff6b6b;border:1px solid #a32d2d}
.status.warn{background:#2a2200;color:#ffcc44;border:1px solid #665500}
.countdown{font-size:12px;color:#4CAF50;text-align:center;display:none}
.btn-green{background:#1a7a2a;border-radius:4px;padding:15px;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;border:none;cursor:pointer;-webkit-appearance:none}
.btn-green:active{opacity:.85}
.btn-green:disabled{background:#1a1a1a;cursor:default}
.btn-green:disabled .btn-green-text{color:#444}
.btn-green-text{font-size:16px;font-weight:700;color:#fff;letter-spacing:.5px;text-transform:uppercase}
.btn-white{background:#fff;border-radius:4px;padding:15px;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;border:none;cursor:pointer;-webkit-appearance:none}
.btn-white:active{opacity:.85}
.btn-white:disabled{background:#1a1a1a;cursor:default}
.btn-white:disabled .btn-white-text{color:#444}
.btn-white-text{font-size:16px;font-weight:700;color:#111;letter-spacing:.5px;text-transform:uppercase}
.btn-reset{padding:10px;display:flex;align-items:center;justify-content:center;width:100%;border:none;background:transparent;cursor:pointer}
.btn-reset-text{font-size:12px;color:#444;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-brand">Drozda Nářadí</div>
    <div class="hdr-title">Záruky</div>
  </div>
  <div class="hdr-badge" id="badge">0 FOTEK</div>
</div>

<div class="body">

  <div>
    <div class="lbl">Název firmy</div>
    <div class="inp-wrap">
      <input type="text" id="firma" placeholder="Zadej název firmy..." autocomplete="off" autocorrect="off" spellcheck="false" oninput="onFirma()">
    </div>
    <div class="folder-bar" id="folderBar"><span id="folderText"></span></div>
  </div>

  <div>
    <div class="lbl">Fotky</div>
    <button class="foto-btn" onclick="spustFoto()">
      <div class="foto-icon-box">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 15.5A3.5 3.5 0 018.5 12 3.5 3.5 0 0112 8.5a3.5 3.5 0 013.5 3.5 3.5 3.5 0 01-3.5 3.5m7-10h-1.8L15.5 4h-7L6.8 5.5H5C3.9 5.5 3 6.4 3 7.5v11C3 19.6 3.9 20.5 5 20.5h14c1.1 0 2-.9 2-2v-11c0-1.1-.9-2-2-2z"/></svg>
      </div>
      <span class="foto-btn-text">Vyfotit / Vybrat</span>
    </button>
    <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="pridatFoto(this)">
    <div class="foto-grid" id="grid"></div>
  </div>

  <div>
    <div class="lbl">Přehled</div>
    <div class="info-box">
      <div class="info-row"><span class="info-lbl">Firma</span><span class="info-val" id="infoFirma">—</span></div>
      <div class="info-row"><span class="info-lbl">Fotek</span><span class="info-val" id="infoCount">0</span></div>
      <div class="info-row"><span class="info-lbl">Datum · Čas</span><span class="info-val" id="infoDatum">—</span></div>
    </div>
  </div>

  <div class="prog-wrap" id="progWrap"><div class="prog-bar" id="progBar"></div></div>
  <div class="status" id="status"></div>
  <div class="countdown" id="countdown"></div>

  <button class="btn-green" id="btnUpload" onclick="nahrat()" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
    <span class="btn-green-text">Nahrát na Drive</span>
  </button>

  <button class="btn-white" id="btnMail" onclick="otevritMail()" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="#111"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
    <span class="btn-white-text">Otevřít Mail</span>
  </button>

  <button class="btn-reset" onclick="resetAll()">
    <span class="btn-reset-text">Nová zakázka</span>
  </button>

</div>

<script>
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbxXfqyyvyO45Lj1lZabnBpUUQ2Z3C6du3gsKc-UBeROKX3Ayp5aaV4M5aylbzaHQMw2GQ/exec';
var MAX_MB=2;
var fotos=[];
var currentFolder='';
var countdownTimer=null;

function pad(n){return String(n).padStart(2,'0');}
function getFolder(firma){var d=new Date();return pad(d.getDate())+'-'+pad(d.getMonth()+1)+'-'+String(d.getFullYear()).slice(2)+'_'+pad(d.getHours())+'-'+pad(d.getMinutes())+'_'+firma.trim().replace(/\s+/g,'-');}
function getDatum(){var d=new Date();return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+String(d.getFullYear()).slice(2)+' · '+pad(d.getHours())+':'+pad(d.getMinutes());}

document.getElementById('infoDatum').textContent=getDatum();

function onFirma(){
  var f=document.getElementById('firma').value.trim();
  document.getElementById('infoFirma').textContent=f||'—';
  if(f){
    currentFolder=getFolder(f);
    document.getElementById('folderText').textContent=currentFolder;
    document.getElementById('folderBar').style.display='block';
  } else {
    document.getElementById('folderBar').style.display='none';
  }
  checkReady();
}

function komprimuj(file,cb){
  var maxBytes=MAX_MB*1024*1024;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var w=img.width,h=img.height,maxDim=2048;
      if(w>maxDim||h>maxDim){if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}else{w=Math.round(w*maxDim/h);h=maxDim;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      var q=0.85;
      (function tryQ(){
        var du=canvas.toDataURL('image/jpeg',q);
        var bytes=(du.length-'data:image/jpeg;base64,'.length)*0.75;
        if(bytes<=maxBytes||q<=0.3){cb(du);}else{q-=0.1;tryQ();}
      })();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function spustFoto(){document.getElementById('fileInput').click();}

function pridatFoto(input){
  var file=input.files[0];
  if(!file) return;
  input.value='';
  komprimuj(file,function(dataUrl){
    fotos.push({data:dataUrl,status:'wait'});
    renderGrid();
    // Okamžitě otevři kameru znovu
    setTimeout(function(){document.getElementById('fileInput').click();},350);
  });
}

function renderGrid(){
  var grid=document.getElementById('grid');
  grid.innerHTML=fotos.map(function(f,i){
    var si='';
    if(f.status==='ok') si='<div class="si ok">✓</div>';
    else if(f.status==='err') si='<div class="si err">!</div>';
    else if(f.status==='uploading') si='<div class="si uploading">↑</div>';
    else si='<div class="si wait">'+(i+1)+'</div>';
    var del=(f.status==='wait'||f.status==='err')?'<button class="del" onclick="smazFoto('+i+')">×</button>':'';
    return '<div class="thumb">'+si+'<img src="'+f.data+'" loading="lazy">'+del+'</div>';
  }).join('');
  var n=fotos.length;
  document.getElementById('badge').textContent=n+' '+(n===1?'FOTKA':n<5?'FOTKY':'FOTEK');
  document.getElementById('infoCount').textContent=n;
  checkReady();
}

function smazFoto(i){fotos.splice(i,1);renderGrid();}

function checkReady(){
  var firma=document.getElementById('firma').value.trim();
  var pending=fotos.filter(function(f){return f.status==='wait'||f.status==='err';});
  document.getElementById('btnUpload').disabled=!(firma&&pending.length>0);
  document.getElementById('btnMail').disabled=!firma;
}

function toBase64(du){return du.split(',')[1];}

async function nahrat(){
  var firma=document.getElementById('firma').value.trim();
  currentFolder=getFolder(firma);
  var pending=fotos.filter(function(f){return f.status==='wait'||f.status==='err';});
  if(!pending.length) return;
  document.getElementById('btnUpload').disabled=true;
  document.getElementById('progWrap').style.display='block';
  document.getElementById('progBar').style.width='0%';
  showStatus('Nahrávám '+pending.length+' '+(pending.length<5?'fotky':'fotek')+'...','warn');
  var total=pending.length,done=0,errors=0;
  for(var i=0;i<fotos.length;i++){
    var f=fotos[i];
    if(f.status!=='wait'&&f.status!=='err') continue;
    f.status='uploading';renderGrid();
    try{
      var resp=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({folder:currentFolder,filename:currentFolder+'_foto'+pad(i+1)+'.jpg',filedata:toBase64(f.data),mimetype:'image/jpeg'})});
      var r=await resp.json();
      if(r.status==='ok'){f.status='ok';done++;}else{f.status='err';errors++;}
    }catch(e){f.status='err';errors++;}
    document.getElementById('progBar').style.width=Math.round(((done+errors)/total)*100)+'%';
    renderGrid();
  }
  if(errors===0){
    showStatus('✓ Hotovo! Nahráno '+done+' '+(done===1?'fotka':done<5?'fotky':'fotek')+' na Google Drive.','ok');
    var sec=3;
    var cd=document.getElementById('countdown');
    cd.style.display='block';
    cd.textContent='Nová zakázka za '+sec+'...';
    countdownTimer=setInterval(function(){
      sec--;
      if(sec<=0){clearInterval(countdownTimer);resetAll();}
      else{cd.textContent='Nová zakázka za '+sec+'...';}
    },1000);
  } else if(done>0){
    showStatus('Nahráno '+done+' z '+total+'. '+errors+' selhalo — zkus znovu.','warn');
  } else {
    showStatus('Chyba nahrávání. Zkontroluj připojení.','err');
  }
  checkReady();
}

function showStatus(msg,type){
  var el=document.getElementById('status');
  el.textContent=msg;el.className='status '+type;el.style.display='block';
}

function otevritMail(){
  var firma=document.getElementById('firma').value.trim();
  window.location.href='mailto:?subject='+encodeURIComponent(firma)+'&body='+encodeURIComponent('Firma: '+firma+'\nDatum: '+getDatum()+'\nSlozka: '+currentFolder);
}

function resetAll(){
  if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;}
  fotos=[];currentFolder='';
  document.getElementById('firma').value='';
  document.getElementById('grid').innerHTML='';
  document.getElementById('badge').textContent='0 FOTEK';
  document.getElementById('infoFirma').textContent='—';
  document.getElementById('infoCount').textContent='0';
  document.getElementById('infoDatum').textContent=getDatum();
  document.getElementById('folderBar').style.display='none';
  document.getElementById('btnUpload').disabled=true;
  document.getElementById('btnMail').disabled=true;
  document.getElementById('status').style.display='none';
  document.getElementById('progWrap').style.display='none';
  document.getElementById('progBar').style.width='0%';
  document.getElementById('countdown').style.display='none';
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>FotoZakazka</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#e0ded6;--text:#1a1a18;--muted:#6b6a65;
  --accent:#185FA5;--accent-bg:#E6F1FB;--success:#1a7a4a;--success-bg:#eaf6f0;
  --danger:#a32d2d;--danger-bg:#fdf0ef;--radius:14px;--radius-sm:10px;
  --sans:-apple-system,'Helvetica Neue',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px 14px;position:sticky;top:0;z-index:10}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.2rem;font-weight:700;letter-spacing:-0.3px}
.logo span{color:var(--accent)}
.badge{background:var(--accent-bg);color:var(--accent);font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px}
main{padding:20px 16px;max-width:500px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{padding:14px 16px 12px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.card-body{padding:16px}
.firma-input{width:100%;font-size:18px;font-weight:600;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none}
.firma-input:focus{border-color:var(--accent);background:#fff}
.firma-input::placeholder{font-weight:400;color:#bbb}
.foto-btn{width:100%;padding:18px;border:2px dashed var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--accent);font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;-webkit-appearance:none}
.foto-btn:active{background:var(--accent-bg);border-color:var(--accent)}
.foto-icon{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.foto-icon svg{width:16px;height:16px;fill:#fff}
input[type=file]{display:none}
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.foto-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--bg)}
.foto-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.foto-thumb .del-btn{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(0,0,0,.6);border:none;border-radius:50%;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.foto-count{font-size:13px;color:var(--muted);margin-top:8px;text-align:center}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.info-row:last-child{border-bottom:none}
.info-row .lbl{color:var(--muted)}
.info-row .val{font-weight:600}
.share-btn{width:100%;padding:18px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:17px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;-webkit-appearance:none}
.share-btn:disabled{background:var(--border);color:var(--muted)}
.mail-btn{width:100%;padding:16px;background:var(--surface);border:1.5px solid var(--accent);border-radius:var(--radius-sm);font-size:16px;font-weight:600;color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;-webkit-appearance:none}
.mail-btn:disabled{border-color:var(--border);color:var(--muted)}
.reset-btn{width:100%;padding:14px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;color:var(--muted);cursor:pointer;-webkit-appearance:none}
.btns-hint{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px;color:var(--muted);text-align:center;margin-top:-8px}
.btns-hint span{background:var(--bg);padding:6px 8px;border-radius:8px;line-height:1.4}
.status-msg{font-size:13px;text-align:center;padding:10px;border-radius:var(--radius-sm)}
.status-ok{background:var(--success-bg);color:var(--success)}
.status-err{background:var(--danger-bg);color:var(--danger)}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">Foto<span>Zakazka</span></div>
    <div class="badge" id="headerBadge">0 fotek</div>
  </div>
</header>
<main>
  <div class="card">
    <div class="card-header">Nazev firmy / zakazky</div>
    <div class="card-body">
      <input class="firma-input" type="text" id="firma" placeholder="Zadej nazev firmy..." autocomplete="off" autocorrect="off" spellcheck="false" oninput="updateInfo()">
    </div>
  </div>
  <div class="card">
    <div class="card-header">Fotky</div>
    <div class="card-body">
      <button class="foto-btn" onclick="document.getElementById('fileInput').click()">
        <div class="foto-icon"><svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 018.5 12 3.5 3.5 0 0112 8.5a3.5 3.5 0 013.5 3.5 3.5 3.5 0 01-3.5 3.5m7-10h-1.8L15.5 4h-7L6.8 5.5H5C3.9 5.5 3 6.4 3 7.5v11C3 19.6 3.9 20.5 5 20.5h14c1.1 0 2-.9 2-2v-11c0-1.1-.9-2-2-2z"/></svg></div>
        Vyfotit / vybrat fotky
      </button>
      <input type="file" id="fileInput" accept="image/*" multiple capture="environment" onchange="addFotos(this)">
      <div class="foto-grid" id="fotoGrid"></div>
      <div class="foto-count" id="fotoCount" style="display:none"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">Prehled</div>
    <div class="card-body">
      <div class="info-row"><span class="lbl">Firma</span><span class="val" id="infoFirma">—</span></div>
      <div class="info-row"><span class="lbl">Pocet fotek</span><span class="val" id="infoCount">0</span></div>
      <div class="info-row"><span class="lbl">Datum</span><span class="val" id="infoDatum">—</span></div>
      <div class="info-row"><span class="lbl">Cas</span><span class="val" id="infoCas">—</span></div>
    </div>
  </div>
  <div id="statusMsg" style="display:none" class="status-msg"></div>
  <button class="share-btn" id="shareBtn" onclick="sdilet()" disabled>
    <svg style="width:22px;height:22px;fill:#fff" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
    Sdilet fotky
  </button>
  <button class="mail-btn" id="mailBtn" onclick="otevritMail()" disabled>
    <svg style="width:20px;height:20px;fill:var(--accent)" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
    Otevrit Mail s predmetem
  </button>
  <div class="btns-hint">
    <span>Sdilet fotky<br>WhatsApp, AirDrop, Drive...</span>
    <span>Otevrit Mail<br>predvyplni predmet emailu</span>
  </div>
  <button class="reset-btn" onclick="resetAll()">Nova zakazka</button>
</main>
<script>
var fotos = [];
function formatDatum(){var d=new Date();return d.toLocaleDateString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric'});}
function formatCas(){var d=new Date();return d.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});}
document.getElementById('infoDatum').textContent=formatDatum();
document.getElementById('infoCas').textContent=formatCas();
function updateInfo(){
  var firma=document.getElementById('firma').value.trim();
  document.getElementById('infoFirma').textContent=firma||'—';
  checkReady();
}
function addFotos(input){
  Array.from(input.files).forEach(function(file){
    var reader=new FileReader();
    reader.onload=function(e){fotos.push({data:e.target.result,name:file.name});renderGrid();};
    reader.readAsDataURL(file);
  });
  input.value='';
}
function renderGrid(){
  var grid=document.getElementById('fotoGrid');
  grid.innerHTML=fotos.map(function(f,i){
    return '<div class="foto-thumb"><img src="'+f.data+'" loading="lazy"><button class="del-btn" onclick="deleteFoto('+i+')">x</button></div>';
  }).join('');
  var count=fotos.length;
  document.getElementById('fotoCount').style.display=count?'block':'none';
  document.getElementById('fotoCount').textContent=count+' '+(count===1?'fotka':count<5?'fotky':'fotek');
  document.getElementById('infoCount').textContent=count;
  document.getElementById('headerBadge').textContent=count+' '+(count===1?'fotka':count<5?'fotky':'fotek');
  checkReady();
}
function deleteFoto(i){fotos.splice(i,1);renderGrid();}
function checkReady(){
  var firma=document.getElementById('firma').value.trim();
  document.getElementById('shareBtn').disabled=!(firma&&fotos.length>0);
  document.getElementById('mailBtn').disabled=!firma;
}
function otevritMail(){
  var firma=document.getElementById('firma').value.trim();
  var datum=formatDatum();
  var cas=formatCas();
  var predmet=encodeURIComponent('Zakazka: '+firma+' - '+datum);
  var text=encodeURIComponent('Zakazka: '+firma+'\nDatum: '+datum+' '+cas+'\nPocet fotek: '+fotos.length+'\n\n(Prilozte fotky k emailu)');
  window.location.href='mailto:?subject='+predmet+'&body='+text;
}
async function sdilet(){
  var firma=document.getElementById('firma').value.trim();
  var datum=formatDatum();
  var cas=formatCas();
  if(!navigator.share){showStatus('Pouzij Safari na iPhonu.',false);return;}
  try{
    var shareFiles=await Promise.all(fotos.map(async function(f,i){
      var res=await fetch(f.data);
      var blob=await res.blob();
      var ext=blob.type.split('/')[1]||'jpg';
      var fileName=firma+'_'+datum.replace(/\./g,'')+'_'+String(i+1).padStart(2,'0')+'.'+ext;
      return new File([blob],fileName,{type:blob.type});
    }));
    var predmet=firma+' - '+datum;
    var zprava='Zakazka: '+firma+'\nDatum: '+datum+' '+cas+'\nPocet fotek: '+fotos.length;
    var shareData={title:predmet,text:zprava,files:shareFiles};
    if(navigator.canShare&&navigator.canShare(shareData)){
      await navigator.share(shareData);
      showStatus('Odesilano!',true);
    } else {
      await navigator.share({title:predmet,text:zprava});
      showStatus('Sdileno (bez fotek)',false);
    }
  } catch(e){if(e.name!=='AbortError')showStatus('Chyba: '+e.message,false);}
}
function showStatus(msg,ok){
  var el=document.getElementById('statusMsg');
  el.textContent=msg;
  el.className='status-msg '+(ok?'status-ok':'status-err');
  el.style.display='block';
  setTimeout(function(){el.style.display='none';},4000);
}
function resetAll(){
  if(fotos.length>0||document.getElementById('firma').value){
    if(!confirm('Smazat vse a zacit novou zakazku?'))return;
  }
  fotos=[];
  document.getElementById('firma').value='';
  document.getElementById('fotoGrid').innerHTML='';
  document.getElementById('fotoCount').style.display='none';
  document.getElementById('headerBadge').textContent='0 fotek';
  document.getElementById('infoFirma').textContent='—';
  document.getElementById('infoCount').textContent='0';
  document.getElementById('infoDatum').textContent=formatDatum();
  document.getElementById('infoCas').textContent=formatCas();
  document.getElementById('shareBtn').disabled=true;
  document.getElementById('mailBtn').disabled=true;
  document.getElementById('statusMsg').style.display='none';
}
</script>
</body>
</html>
